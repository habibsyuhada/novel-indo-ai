name: Deploy Next.js Standalone to VPS

on:
  push:
    branches:
      - main # Akan berjalan setiap kali ada push ke branch 'main'

# Definisikan variabel di sini agar mudah diubah kapan saja
env:
  DEPLOY_DIR: "/var/www/novel-indo-ai" # Ganti dengan path folder baru Anda di VPS
  APP_NAME: "novel-indo-ai"            # Ganti dengan nama proses PM2 yang Anda inginkan

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare Standalone Output
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Copy Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".next/standalone/*"
          # Menggunakan variabel env.DEPLOY_DIR
          target: ${{ env.DEPLOY_DIR }} 
          strip_components: 2

      - name: Start/Restart PM2 on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Menggunakan variabel env.DEPLOY_DIR dan env.APP_NAME langsung di dalam script
          script: |
            cd ${{ env.DEPLOY_DIR }}
            pm2 restart ${{ env.APP_NAME }} || PORT=3000 pm2 start server.js --name "${{ env.APP_NAME }}"
            pm2 save
